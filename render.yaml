services:
  - type: web
    name: ccf-benchmarks-mcp
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python mcp_server.py
    envVars:
      - key: MCP_TRANSPORT
        value: streamable-http
      - key: BASE_URL
        value: https://csrd-benchmarks-mcp.onrender.com
      - key: OAUTH_CLIENT_ID
        value: ccf-benchmarks          # client ID to share with connector users
      - key: OAUTH_CLIENT_SECRET
        sync: false                    # set manually in Render dashboard — leave unset for open access
